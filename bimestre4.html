<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../tarea1/css/estilos.css">
</head>
<body>
    <section class="bimestre">
        <h1>Cuarto Bimestre</h1>
    
        <div class="grid">
    
            <!-- EJERCICIO 1 -->
            <div class="card">
                <h2>Simulador de Login</h2>
                <input type="text" id="user">
                <input type="password" id="pass">
                <button onclick="login()">Ingresar</button>
                <p id="mensajeLogin"></p>
            </div>
    
            <!-- EJERCICIO 2 -->
            <div class="card">
                <h2>Calcular Promedio</h2>
                <input type="number" id="nota1">
                <input type="number" id="nota2">
                <input type="number" id="nota3">
                <button onclick="calcularPromedio()">Calcular</button>
                <p id="resultadoPromedio"></p>
            </div>
    
            <!-- EJERCICIO 3 -->
            <div class="card">
                <h2>Cuenta Regresiva</h2>
                <button onclick="iniciarCuenta()">Iniciar</button>
                <p id="cuenta"></p>
            </div>
    
            <!-- EJERCICIO 4 -->
            <div class="card">
                <h2>Mostrar Fecha Actual</h2>
                <button onclick="mostrarFecha()">Ver Fecha</button>
                <p id="fecha"></p>
            </div>
    
        </div>
    </section>
</body>
</html>
