<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../tarea1/css/estilos.css">
</head>
<body>
    <section class="bimestre">
        <h1>Primer Bimestre</h1>
    
        <div class="grid">
    
            <!-- EJERCICIO 1 -->
            <div class="card">
                <h2>Ejercicio 1: Calculadora Básica</h2>
                <input type="number" id="num1" placeholder="Número 1">
                <input type="number" id="num2" placeholder="Número 2">
                <button onclick="sumar()">Sumar</button>
                <p id="resultadoSuma"></p>
            </div>
    
            <!-- EJERCICIO 2 -->
            <div class="card">
                <h2>Ejercicio 2: Cambio de Color</h2>
                <button onclick="cambiarColor()">Cambiar Fondo</button>
            </div>
    
            <!-- EJERCICIO 3 -->
            <div class="card">
                <h2>Ejercicio 3: Validación de Edad</h2>
                <input type="number" id="edad" placeholder="Ingrese su edad">
                <button onclick="verificarEdad()">Verificar</button>
                <p id="mensajeEdad"></p>
            </div>
    
            <!-- EJERCICIO 4 -->
            <div class="card">
                <h2>Ejercicio 4: Reloj Digital</h2>
                <p id="reloj"></p>
            </div>
    
        </div>
    </section>
</body>
</html>
